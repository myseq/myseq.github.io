<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MySeq</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link href='https://fonts.googleapis.com/css?family=Noto Sans' rel='stylesheet'>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.4.8/angular.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.4.8/angular-route.js"></script>
  <style>
    p { color:orange; letter-spacing: 2.5px;
	position: relative; left:3%; width: 68%; }
    h1,h2 { Left 1%; color:white; letter-spacing: 3.8px; }	    
    html,body { font-family: "Noto Sans", "Noto Sans CJK SC TC", sans-serif; 
                color:yellow; line-height: 1.68;
	       	position: relative; Left: 3%; width:68%; height: 100%; }
    #Main_Left img { float: left; }
    #Main_Right img { float: right; }
  </style>
</head>
<body bgcolor="black" ng-app="myApp">

<div id="Main_Left">
   <img src="expert.jpg" alt="myseq" style="width:108px;height:108px;margin:auto;padding:3px;">
   <div id="Main_Right">
     <h1>MySeq</h1>
     <p style="font-size:72%;">This site is fully edited using VI.</p>
     <p>∞ | <a href="#a">About</a> | <a href="#b">Links</a> | <a href="#/">Others</a> | ∞</p>
    </div>
</div>

<p></p>
<p></p>

<div ng-view></div>

<p></p><hr>
<p></p>


<script>
var app = angular.module("myApp", ["ngRoute"]);
app.config(function($routeProvider) {
    $routeProvider
    .when("/a", {
	    template : "<h2>About ZD</h2><p>Interested in learning many things:</p><ul style='69%'><li>Network security<li>Coding (Python/Ruby)</li><li>Clouds (Google/Azure/AWS)<li>Kubernetes and docker/container<li>IoT (ESP8266 and Raspberry Pi)<li>etc.</li>"
    })
    .when("/b", {
        template : "<h2>Links</h2><p>some links here.</p>"
    })
    .otherwise({
        template : "<h2>Others</h2><p>Not yet available.</p>"
    });
});
</script>

  
</body>
</html>
